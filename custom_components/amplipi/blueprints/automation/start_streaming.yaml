blueprint:
  name: "AmpliPi Start Streaming"
  description: "Connect a Source to a Stream and assign Zone(s) to the Source."
  domain: automation
  input:
    source:
      name: "Source"
      description: "Select the source"
      selector:
        entity:
          domain: media_player
          include_entities: "{{ states.media_player 
            | selectattr('attributes.friendly_name', 'search', 'AmpliPi.*Source') 
            | map(attribute='entity_id') | list }}"
          multiple: false
    stream:
      name: "Stream"
      description: "Select the audio stream."
      selector:
        select:
          options: "{{ state_attr('media_player.amplipi_source_1', 'source_list') | default([]) }}"
          multiple: false
    zones:
      name: "Zones"
      description: "Select one or more zones for audio output."
      selector:
        entity:
          domain: media_player
          include_entities: "{{ states.media_player 
            | selectattr('attributes.friendly_name', 'search', 'AmpliPi.*Zone') 
            | map(attribute='entity_id') | list +
            states.media_player 
            | selectattr('attributes.friendly_name', 'search', 'AmpliPi.*Group') 
            | map(attribute='entity_id') | list }}"
          multiple: true

mode: single

trigger:
  - platform: state
    entity_id: !input source

action:
  - service: media_player.select_source
    target:
      entity_id: !input source
    data:
      source: !input stream

  - delay: "00:00:01"

  - repeat:
      for_each: !input zones
      sequence:
        - service: media_player.select_source
          target:
            entity_id: "{{ repeat.item }}"
          data:
            source: !input source
