blueprint:
  name: "AmpliPi Start Streaming"
  description: "Connect a Source to a Stream and assign Zone(s) to the Source."
  domain: automation

  input:
    source:
      name: "Source"
      description: "Select the source"
      selector:
        entity:
          filter:
            - domain: media_player
            - device_class: receiver
            - integration: AmpliPi

    stream:
      name: "Stream"
      description: "Select the audio stream."
      selector:
        attribute:
          entity_id: media_player.amplipi_source_1.amplipi_streams

    zones:
      name: "Zones"
      description: "Select one or more zones for audio output."
      selector:
        entity:
          filter:
            - domain: media_player
            - device_class: speaker
            - integration: AmpliPi
          multiple: true

mode: single

action:
  - service: media_player.select_source
    target:
      entity_id: !input source
    data:
      source: !input stream

  - delay: "00:00:01"

  - repeat:
      for_each: !input zones
      sequence:
        - service: media_player.select_source
          target:
            entity_id: "{{ repeat.item }}"
          data:
            source: !input source
