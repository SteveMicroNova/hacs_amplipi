blueprint:
  name: "AmpliPi Start Streaming"
  description: "Connect a Source to a Stream and assign Zone(s) to the Source."
  domain: automation
  input:
    source:
      name: "Source"
      description: "Select the source"
      selector:
        entity:
          domain: media_player
          multiple: false
    stream:
      name: "Stream"
      description: "Select the audio stream."
      selector:
        entity:
          domain: media_player
          multiple: false
    zones:
      name: "Zones"
      description: "Select one or more zones for audio output."
      selector:
        entity:
          domain: media_player
          multiple: true

variables:
  amplipi_sources: >
    {{ states.media_player | selectattr('attributes._amplipi_type', 'eq', 'source') | map(attribute='entity_id') | list }}
  amplipi_zones: >
    {{ states.media_player | selectattr('attributes._amplipi_type', 'eq', 'zone') | map(attribute='entity_id') | list }}

mode: single

trigger:
  - platform: state
    entity_id: !input source

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id in amplipi_sources }}"
        sequence:
          - service: media_player.select_source
            target:
              entity_id: !input source
            data:
              source: !input stream

  - delay: "00:00:01"

  - repeat:
      for_each: !input zones
      sequence:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ repeat.item in amplipi_zones }}"
              sequence:
                - service: media_player.select_source
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    source: !input source
