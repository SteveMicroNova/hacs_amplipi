template:
  - sensor:
      - name: "AmpliPi Sources"
        unique_id: amplipi_sources
        state: >-
          {{ states.media_player 
             | selectattr('attributes.friendly_name', 'contains', 'AmpliPi')
             | selectattr('attributes.friendly_name', 'contains', 'Source') 
             | map(attribute='entity_id') 
             | list | to_json }}

      - name: "AmpliPi Zones"
        unique_id: amplipi_zones
        state: >-
          {{ states.media_player 
             | selectattr('attributes.friendly_name', 'contains', 'AmpliPi')
             | selectattr('attributes.friendly_name', 'contains', 'Zone' or 'Group') 
             | map(attribute='entity_id') 
             | list | to_json }}
