template:
  - sensor:
      - name: "AmpliPi Sources"
        unique_id: amplipi_sources
        state: >-
          {{ states.media_player 
             | selectattr('attributes.amplipi_type', 'eq', 'source') 
             | map(attribute='entity_id') 
             | list | to_json }}

      - name: "AmpliPi Zones"
        unique_id: amplipi_zones
        state: >-
          {{ states.media_player 
             | selectattr('attributes.amplipi_type', 'eq', 'zone') 
             | map(attribute='entity_id') 
             | list | to_json }}
